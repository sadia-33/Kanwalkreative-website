<body>

<div class="scene">
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="bg-blob bg-blob-3"></div>

  <a href="homepage.html" class="center-logo">

</a>
  <p class="tagline">Every story matters here</p>
  <a href="strategy.html"     class="btn btn-purple"  id="btn1">Strategy</a>
  <a href="homepage.html"     class="btn btn-outline" id="btn2">Organic Content</a>
  <a href="portfolio.html"    class="btn btn-green"   id="btn3">Portfolio</a>

  <a href="contact.html"      class="btn btn-purple"  id="btn8">Contact</a>
</div>

<script>
  const btns = Array.from(document.querySelectorAll('.btn'));
  const MIN_DIST = 130;

  const configs = [
    { rx: 0.38, ry: 0.38, speed:  0.00030, angle: 0.00 },
    { rx: 0.42, ry: 0.32, speed: -0.00026, angle: 0.78 },
    { rx: 0.36, ry: 0.42, speed:  0.00034, angle: 1.57 },
    { rx: 0.44, ry: 0.30, speed: -0.00028, angle: 2.36 },
    { rx: 0.40, ry: 0.40, speed:  0.00022, angle: 3.14 },
    { rx: 0.34, ry: 0.36, speed: -0.00032, angle: 3.93 },
    { rx: 0.46, ry: 0.34, speed:  0.00024, angle: 4.71 },
    { rx: 0.38, ry: 0.44, speed: -0.00020, angle: 5.50 },
  ];

  let lastTime = null;

  function getPos(i, w, h) {
    const cfg = configs[i];
    return {
      x: w / 2 + (w * cfg.rx) * Math.cos(cfg.angle) - btns[i].offsetWidth  / 2,
      y: h / 2 + (h * cfg.ry) * Math.sin(cfg.angle) - btns[i].offsetHeight / 2,
    };
  }

  function clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }

  function animate(ts) {
    if (!lastTime) lastTime = ts;
    const dt = Math.min(ts - lastTime, 32);
    lastTime = ts;

    const w = window.innerWidth;
    const h = window.innerHeight;

    configs.forEach((c, i) => { c.angle += c.speed * dt; });

    const positions = configs.map((_, i) => getPos(i, w, h));
// Fix Home Page button at bottom center
const homeBtn = document.getElementById('btn7');
homeBtn.style.position = 'fixed';
homeBtn.style.left = 'calc(50% - ' + (homeBtn.offsetWidth/2 - 40) + 'px)';
homeBtn.style.top = 'auto';
homeBtn.style.bottom = '30px';
homeBtn.style.transform = 'none';
    btns.forEach((btn, i) => {
  if (i === 6) return;
      const x = clamp(positions[i].x, 8, w - btn.offsetWidth  - 8);
      const y = clamp(positions[i].y, 8, h - btn.offsetHeight - 8);
      btn.style.left = x + 'px';
      btn.style.top  = y + 'px';
    });

    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);
</script>

</body>
</html>
